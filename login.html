<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mala Fama — Iniciar sesión</title>
<link rel="icon" type="image/png" href="assets/images/logo.png">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0a0a12;
    background-image: radial-gradient(circle at 30% 20%, rgba(0,229,255,.08), transparent 50%);
    color: #e8e8f0;
    font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    padding: 20px;
  }
  .card {
    background: #12121c;
    border: 1px solid #22222e;
    border-radius: 16px;
    padding: 40px 36px;
    max-width: 380px;
    width: 100%;
    text-align: center;
  }
  .logo { width: 72px; height: 72px; border-radius: 50%; border: 2px solid #00e5ff; object-fit: cover; margin: 0 auto 20px; display: block; }
  h1 { font-size: 26px; letter-spacing: .04em; margin-bottom: 6px; font-weight: 800; }
  h1 em { color: #00e5ff; font-style: normal; }
  p.sub { color: #9090a0; font-size: 13px; margin-bottom: 28px; }
  .btn-google {
    display: flex; align-items: center; justify-content: center; gap: 10px;
    background: #fff; color: #1f1f1f; font-weight: 600; font-size: 14px;
    padding: 12px 20px; border-radius: 8px; text-decoration: none;
    transition: opacity .2s;
  }
  .btn-google:hover { opacity: .9; }
  .err { margin-top: 18px; color: #ff6b6b; font-size: 12px; display: none; }
  footer { margin-top: 24px; color: #555; font-size: 11px; }
</style>
</head>
<body>
  <div class="card">
    <img class="logo" src="assets/images/logo.png" alt="Mala Fama" onerror="this.style.display='none'">
    <h1>MALA<em>FAMA</em></h1>
    <p class="sub">Panel interno — acceso restringido</p>
    <a class="btn-google" href="/api/auth/login">
      <svg width="18" height="18" viewBox="0 0 18 18" aria-hidden="true">
        <path fill="#4285F4" d="M17.64 9.2c0-.64-.06-1.25-.16-1.84H9v3.48h4.84c-.21 1.13-.84 2.09-1.8 2.73v2.27h2.91c1.7-1.57 2.69-3.87 2.69-6.64z"/>
        <path fill="#34A853" d="M9 18c2.43 0 4.47-.8 5.96-2.17l-2.91-2.27c-.81.54-1.84.86-3.05.86-2.35 0-4.34-1.58-5.05-3.71H.98v2.34C2.46 15.98 5.48 18 9 18z"/>
        <path fill="#FBBC05" d="M3.95 10.71c-.18-.54-.28-1.11-.28-1.71s.1-1.17.28-1.71V4.96H.98C.36 6.17 0 7.54 0 9s.36 2.83.98 4.04l2.97-2.33z"/>
        <path fill="#EA4335" d="M9 3.58c1.32 0 2.51.45 3.44 1.35l2.58-2.58C13.46.89 11.43 0 9 0 5.48 0 2.46 2.02.98 4.96l2.97 2.33C4.66 5.16 6.65 3.58 9 3.58z"/>
      </svg>
      Iniciar sesión con Google
    </a>
    <div class="err" id="err"></div>
    <footer>Mala Fama © 2024</footer>
  </div>
  <script>
    var params = new URLSearchParams(location.search);
    var err = params.get('error');
    if (err) {
      var msgs = {
        unauthorized_email: 'Esa cuenta de Google no tiene acceso a este panel.',
        invalid_state: 'La solicitud expiró o no es válida, intenta de nuevo.',
        token_exchange_failed: 'No se pudo completar el inicio de sesión con Google.',
        access_denied: 'Cancelaste el inicio de sesión.',
      };
      var el = document.getElementById('err');
      el.textContent = msgs[err] || 'No se pudo iniciar sesión. Intenta de nuevo.';
      el.style.display = 'block';
      var detail = params.get('detail');
      if (detail) {
        var d = document.createElement('div');
        d.style.cssText = 'margin-top:10px;font-size:10px;color:#666;text-align:left;word-break:break-all;background:#0a0a12;padding:8px;border-radius:6px';
        d.textContent = detail;
        el.parentNode.insertBefore(d, el.nextSibling);
      }
    }
  </script>
</body>
</html>
